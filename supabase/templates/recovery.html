<h2>Reset your password</h2>
<p>We received a request to reset your Digital Shop password.</p>
<p>
  <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=/auth/reset-password">
    Choose a new password
  </a>
</p>
<p>This link expires shortly and can only be used once. If you did not request it, you can ignore this email.</p>
